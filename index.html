<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Q6 – 2×2 Table Page</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 820px; margin: 0 auto; }
    td { border: 1px solid #999; padding: 16px; vertical-align: top; width: 50%; height: 260px; }
    .top-right img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    a { color: #00467f; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <table>
    <tr>
      <!-- Top left: link to the statistics department at TAMU -->
      <td>
        <h3>Department Link</h3>
        <p>
          <a href="https://artsci.tamu.edu/statistics/index.html" target="_blank" rel="noopener">
            Texas A&amp;M University — Department of Statistics
          </a>
        </p>
      </td>

      <!-- Top right: your picture -->
      <td class="top-right">
        <h3>My Picture</h3>
        <!-- Replace my_photo.jpg with your actual file name -->
        <img src="my_photo.jpg" alt="My portrait" />
      </td>
    </tr>

    <tr>
      <!-- Bottom left: two-sentence biography as a UL list -->
      <td>
        <h3>About Me</h3>
        <ul>
          <li>I am a Ph.D. student in Chemical Engineering at Texas A&amp;M University.</li>
          <li>My research focuses on multiparametric dynamic optimization and control.</li>
        </ul>
      </td>

      <!-- Bottom right: blank -->
      <td></td>
    </tr>
  </table>

</body>
</html>
